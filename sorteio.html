<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sorteios - Rio Negrinho Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F4F6FB;color:#0D1B2A;min-height:100vh}
header{background:linear-gradient(135deg,#1565C0,#1976D2);padding:16px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 20px rgba(0,0,0,.15)}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;text-decoration:none}
header h1{color:#fff;font-size:20px;font-weight:800}
.content{padding:30px 20px;max-width:800px;margin:0 auto;text-align:center}
.content h2{font-size:26px;font-weight:800;color:#1565C0;margin-bottom:10px}
.content p{color:#777;font-size:15px;margin-bottom:30px}
.placeholder{background:#fff;border-radius:20px;padding:60px 30px;box-shadow:0 4px 24px rgba(21,101,192,.1)}
.placeholder i{font-size:64px;color:#1565C0;margin-bottom:16px;display:block}
.placeholder p{color:#555;font-size:15px;line-height:1.8}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html"><i class="fas fa-arrow-left"></i></a>
  <h1>🎰 Sorteios</h1>
</header>
<div class="content">
  <div class="placeholder">
    <i class="fas fa-ticket-alt"></i>
    <h2>Sorteios Rio Negrinho Shop</h2>
    <p>Esta página está pronta para você inserir o conteúdo do sorteio.<br/>Substitua este conteúdo pelo código HTML do seu sorteio.</p>
    <br/>
    <p style="font-size:13px;color:#aaa">Cole o código do sorteio aqui — a página já está vinculada à loja.</p>
  </div>
</div>
</body>
</html>
