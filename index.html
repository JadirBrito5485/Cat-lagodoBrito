<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bate-Papo Rio Negrinho - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: sans-serif; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.95; }
        .msg-box { max-width: 75%; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; display: flex; align-items: flex-start; gap: 10px; }
        .msg-in { background-color: #202c33; align-self: flex-start; }
        .msg-out { background-color: #005c4b; align-self: flex-end; flex-direction: row-reverse; }
        #modal-cadastro { background: rgba(0,0,0,0.95); z-index: 9999; transition: opacity 0.3s; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="modal-cadastro" class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-[#202c33] p-8 rounded-2xl w-full max-w-md shadow-2xl border border-slate-700">
            <h2 class="text-2xl font-bold text-center text-green-500 mb-6 uppercase">Cadastro de Membro</h2>
            <div class="space-y-4">
                <div class="flex flex-col items-center mb-4">
                    <label for="img-input" class="cursor-pointer group">
                        <div id="preview-avatar" class="w-24 h-24 bg-slate-700 rounded-full flex items-center justify-center border-2 border-dashed border-slate-500 overflow-hidden group-hover:border-green-500 transition-all">
                            <span class="text-[10px] text-slate-400">CLIQUE PARA FOTO</span>
                        </div>
                    </label>
                    <input type="file" id="img-input" accept="image/*" class="hidden" onchange="previewImage(this)">
                </div>
                <input type="text" id="reg-nome" placeholder="Nome Completo" class="w-full p-3 bg-[#111b21] rounded-xl border border-slate-700 outline-none focus:ring-2 ring-green-500">
                <input type="text" id="reg-cpf" placeholder="CPF" class="w-full p-3 bg-[#111b21] rounded-xl border border-slate-700 outline-none focus:ring-2 ring-green-500">
                <input type="text" id="reg-whats" placeholder="WhatsApp (DDD + Número)" class="w-full p-3 bg-[#111b21] rounded-xl border border-slate-700 outline-none focus:ring-2 ring-green-500">
                <button onclick="salvarCadastro()" class="w-full bg-[#00a884] text-white font-black py-4 rounded-xl uppercase hover:bg-[#008f6f] transition-all shadow-lg">Entrar no Chat</button>
            </div>
        </div>
    </div>

    <header class="bg-[#202c33] p-4 flex items-center justify-between border-b border-slate-700 shadow-md">
        <div class="flex items-center gap-3">
            <img id="my-avatar" src="" class="w-10 h-10 rounded-full border-2 border-green-500 object-cover hidden">
            <div>
                <h1 class="font-bold text-sm" id="chat-title">Bate-Papo Rio Negrinho</h1>
                <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Online agora</p>
            </div>
        </div>
        <button onclick="logout()" class="text-[10px] text-red-400 font-bold uppercase hover:underline">Sair / Trocar Conta</button>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 chat-bg"></main>

    <footer class="bg-[#202c33] p-4">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="msg-input" placeholder="Escreva sua mensagem..." autocomplete="off" class="flex-1 bg-[#2a3942] border-none rounded-xl px-4 py-3 text-sm outline-none text-white">
            <button type="submit" class="bg-[#00a884] text-white p-3 rounded-xl hover:bg-[#008f6f] transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
            </button>
        </form>
    </footer>

    <script>
        // --- 1. CONFIGURAÇÃO FIREBASE ---
        // Se você não tiver as chaves agora, o chat funcionará apenas localmente.
        const firebaseConfig = {
            apiKey: "AIzaSyAs-SUA-CHAVE", // SUBSTITUA AQUI
            databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com/", // SUBSTITUA AQUI
            projectId: "seu-projeto", // SUBSTITUA AQUI
        };
        
        // Inicializa Firebase apenas se a chave não for a de exemplo
        let db = null;
        let messagesRef = null;
        if(firebaseConfig.apiKey !== "AIzaSyAs-SUA-CHAVE") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            messagesRef = db.ref('chat_v2');
        }

        // --- 2. FILTRO DE PALAVRAS ---
        const proibidas = ["palavrao1", "ofensa1", "burro", "idiota"];

        // --- 3. CONTROLE DE USUÁRIO ---
        let userData = JSON.parse(localStorage.getItem('user_rn_shop'));
        let userPhoto = localStorage.getItem('user_photo_rn');

        window.onload = () => {
            if(userData && userPhoto) {
                document.getElementById('modal-cadastro').style.display = 'none';
                document.getElementById('my-avatar').src = userPhoto;
                document.getElementById('my-avatar').classList.remove('hidden');
                document.getElementById('chat-title').innerText = "Olá, " + userData.nome;
                iniciarChat();
            }
        };

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    userPhoto = e.target.result;
                    document.getElementById('preview-avatar').innerHTML = `<img src="${userPhoto}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function salvarCadastro() {
            const nome = document.getElementById('reg-nome').value.trim();
            const cpf = document.getElementById('reg-cpf').value.trim();
            const whats = document.getElementById('reg-whats').value.trim();

            if(!nome || !cpf || !whats || !userPhoto) {
                alert("Jadir, preencha todos os campos e coloque sua foto!");
                return;
            }

            userData = { nome, cpf, whats };
            localStorage.setItem('user_rn_shop', JSON.stringify(userData));
            localStorage.setItem('user_photo_rn', userPhoto);
            
            // Fecha modal e libera chat
            document.getElementById('modal-cadastro').style.display = 'none';
            location.reload(); 
        }

        function iniciarChat() {
            if(!messagesRef) return; // Se não tem Firebase, para aqui.

            messagesRef.limitToLast(50).on('child_added', (snapshot) => {
                const data = snapshot.val();
                renderizarMensagem(data);
            });
        }

        function renderizarMensagem(data) {
            const chatWindow = document.getElementById('chat-window');
            const isMe = data.nome === userData.nome;

            const div = document.createElement('div');
            div.className = `msg-box ${isMe ? 'msg-out' : 'msg-in'}`;
            
            div.innerHTML = `
                <img src="${data.foto || 'https://via.placeholder.com/40'}" class="w-8 h-8 rounded-full object-cover border border-slate-600">
                <div class="flex flex-col">
                    <span class="text-[9px] font-bold ${isMe ? 'text-green-300' : 'text-blue-400'} uppercase">${data.nome}</span>
                    <p class="text-sm">${data.texto}</p>
                </div>
            `;

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        document.getElementById('chat-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if(!messagesRef) return alert("Configure o Firebase para enviar mensagens!");

            const input = document.getElementById('msg-input');
            let text = input.value.trim();

            if(text) {
                // Filtro
                proibidas.forEach(p => {
                    const r = new RegExp(p, "gi");
                    text = text.replace(r, "****");
                });

                messagesRef.push().set({
                    nome: userData.nome,
                    foto: userPhoto,
                    texto: text,
                    timestamp: Date.now()
                });
                input.value = "";
            }
        });

        function logout() {
            localStorage.removeItem('user_rn_shop');
            localStorage.removeItem('user_photo_rn');
            location.reload();
        }
    </script>
</body>
</html>
