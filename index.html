<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rio Negrinho Shop 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body oncontextmenu="return false;">

    <div id="cart-float">
        <i class="fas fa-shopping-cart"></i>
        <div class="badge-red" id="badge-count">0</div>
    </div>

    <div id="main-view">
        <header>
            <div class="header-container">
                <div class="logo">Rio Negrinho Shop</div>
                <div class="search-box">
                    <input type="text" id="searchBar" placeholder="Pesquisar na loja..." onkeyup="filterProducts()">
                </div>
                <div class="cart-icon-top" onclick="toggleCart(true)">
                    <i class="fas fa-shopping-basket"></i>
                </div>
            </div>
        </header>

        <div class="container" id="product-grid"></div>

        <section class="not-found-section">
            <h4>Não achou o que procurava?</h4>
            <div class="not-found-form">
                <input type="text" id="missingInput" placeholder="Nome do produto...">
                <button onclick="sendMissing()">ENVIAR</button>
            </div>
        </section>

        <footer>
            <div class="footer-links">
                <span onclick="loadInfo('quem_somos')">Quem Somos</span>
                <span onclick="loadInfo('suporte')">Suporte e Garantia</span>
                <a href="sorteio.html">Sorteios</a>
                <span onclick="enterAdmin()">ADM</span>
            </div>
            <p>Rio Negrinho Shop 2026</p>
        </footer>
    </div>

    <div id="cart-sidebar">
        <div class="cart-sidebar-header">
            <h3>Meu Carrinho</h3>
            <i class="fas fa-times" onclick="toggleCart(false)"></i>
        </div>
        <div id="cart-items-list" class="cart-items-container"></div>
        <div class="cart-sidebar-footer">
            <h3 class="total-text">Total: <span id="cart-total">R$ 0,00</span></h3>
            <div class="checkout-form">
                <input type="text" id="u_nome" placeholder="Nome Completo">
                <input type="text" id="u_cpf" placeholder="CPF">
                <input type="text" id="u_rua" placeholder="Rua e Nº da Casa">
                <input type="text" id="u_bairro" placeholder="Bairro">
                <select id="u_pag" onchange="checkTroco(this.value)">
                    <option value="">Forma de Pagamento?</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
                <input type="text" id="u_troco" placeholder="Troco para quanto?" style="display:none">
                <textarea id="u_obs" placeholder="Observações..."></textarea>
            </div>
            <button class="btn-finalize" onclick="finalizeOrder()">FINALIZAR COMPRA</button>
            <button class="btn-continue" onclick="toggleCart(false)">Continuar Comprando</button>
        </div>
    </div>

    <div id="admin-panel" class="admin-view">
        <header class="adm-header">
            <h2>Painel Administrativo</h2>
            <button onclick="exitAdmin()">SAIR ADM</button>
        </header>
        <div class="adm-body">
            <div class="adm-card">
                <h3>Cadastrar Novo Produto</h3>
                <input type="text" id="p_title" placeholder="Título do Produto">
                <input type="text" id="p_price" placeholder="Preço (ex: 99.90)">
                <input type="text" id="p_img" placeholder="URL da Imagem (Link)">
                <input type="number" id="p_stock" placeholder="Quantidade em Estoque">
                <textarea id="p_desc" placeholder="Descrição Detalhada"></textarea>
                <button onclick="saveNewProduct()">CADASTRAR NO SERVIDOR</button>
            </div>

            <div class="adm-card">
                <h3>Editar Textos Institucionais</h3>
                <textarea id="edit_quem" placeholder="Texto da página Quem Somos"></textarea>
                <button onclick="saveStaticText('quem_somos')">Salvar Quem Somos</button>
                <textarea id="edit_suporte" placeholder="Texto da página Suporte"></textarea>
                <button onclick="saveStaticText('suporte')">Salvar Suporte</button>
            </div>

            <h3>Gerenciar Produtos Ativos</h3>
            <div id="adm-product-list">
                </div>
        </div>
    </div>

    <div id="modalDetails" class="modal">
        <div class="modal-body">
            <h2 id="modal-title"></h2>
            <div id="modal-desc" style="max-height: 400px; overflow-y: auto;"></div>
            <button onclick="closeModal()">FECHAR</button>
        </div>
    </div>

    <div id="zoomLayer" class="zoom-overlay" onclick="this.style.display='none'">
        <img id="zoomImg" src="" alt="Imagem ampliada">
    </div>

    <a href="https://wa.me/5547988771313" class="wa-float" target="_blank" aria-label="Falar no WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script type="module" src="script.js"></script>
</body>
</html>
